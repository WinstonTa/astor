services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: astor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: astor
    ports:
      - "5432:5432"
    volumes:
      - astor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d astor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  astor_pgdata:
